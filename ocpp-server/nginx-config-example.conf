# Nginx Configuration for OCPP Server
# Save this to: /etc/nginx/sites-available/ocpp
# Enable with: sudo ln -s /etc/nginx/sites-available/ocpp /etc/nginx/sites-enabled/
# Test with: sudo nginx -t
# Reload with: sudo systemctl reload nginx

upstream ocpp_backend {
    server 127.0.0.1:9000;
    keepalive 64;
}

# HTTP server - redirects to HTTPS
server {
    listen 80;
    server_name ocpp.crm.energy-stream.net;

    # Allow Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server - WebSocket proxy
server {
    listen 443 ssl http2;
    server_name ocpp.crm.energy-stream.net;

    # SSL certificates (after running certbot)
    ssl_certificate /etc/letsencrypt/live/ocpp.crm.energy-stream.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocpp.crm.energy-stream.net/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Logging
    access_log /var/log/nginx/ocpp-access.log;
    error_log /var/log/nginx/ocpp-error.log;

    # WebSocket and HTTP proxy
    location / {
        proxy_pass http://ocpp_backend;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts for long-running WebSocket connections
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint (optional: restrict to internal IPs)
    location /health {
        proxy_pass http://ocpp_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Optional: Restrict access
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;
    }
}

